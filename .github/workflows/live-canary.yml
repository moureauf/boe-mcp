name: Live canary
# The BoE IADB is not an official API and the MPC dates page can be
# redesigned. This weekly run of the live integration tests catches format
# changes before users hit them. workflow_dispatch allows a manual run.
on:
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC
  workflow_dispatch:
permissions:
  contents: read
  issues: write
jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: 24 }
      - run: npm ci
      - run: npm run test:live
      # A failure here usually means the BoE changed the IADB CSV format or
      # redesigned the MPC dates page. Open (or comment on) a tracking issue
      # so it doesn't silently rot in workflow run history.
      - name: Open or update tracking issue on failure
        if: failure()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const label = "live-canary";
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
                color: "d73a4a",
                description: "Live BoE canary test failed",
              });
            } catch (err) {
              if (err.status !== 422) throw err; // 422 = label already exists
            }

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = "Live canary failed: BoE endpoint or format change";

            const existing = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open label:${label}`,
            });

            if (existing.data.items.length > 0) {
              const issue = existing.data.items[0];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Live canary failed again: ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                labels: [label],
                body: [
                  "The scheduled live canary run against the real BoE endpoints failed.",
                  "This usually means the IADB CSV format or the MPC dates page changed.",
                  "",
                  `Failed run: ${runUrl}`,
                ].join("\n"),
              });
            }
