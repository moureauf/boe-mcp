name: Publish
on:
  push:
    tags: ["v*"]
  workflow_dispatch: # manual publish of the version in package.json
jobs:
  npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC for npm trusted publishing + provenance
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      # Use the npm bundled with Node 24 (>= 11.5.1, which trusted publishing
      # needs). We deliberately do NOT `npm install -g npm@latest`: a broken
      # latest once shipped without its `sigstore` dep, failing
      # `npm publish --provenance` with "Cannot find module 'sigstore'".
      - run: npm --version
      - run: npm ci
      - run: npm run build
      - run: npm test
      # No NODE_AUTH_TOKEN: auth comes from the OIDC token via the trusted
      # publisher configured for this repo/workflow on npmjs.com.
      # npm versions are immutable; skip if this version is already published so
      # re-running the workflow (e.g. after re-tagging to recover a release that
      # failed later on) doesn't hard-fail here. The mcp-registry job still runs.
      - name: Publish to npm (skip if this version already exists)
        run: |
          version=$(node -p "require('./package.json').version")
          if npm view "boe-mcp@$version" version >/dev/null 2>&1; then
            echo "boe-mcp@$version is already on npm — skipping publish."
          else
            npm publish --provenance --access public
          fi

  # Separate job so a registry hiccup can't fail an already-successful npm
  # publish, and can be re-run on its own ("Re-run failed jobs"). npm versions
  # are immutable, so re-running the npm job would fail on a duplicate.
  mcp-registry:
    needs: npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC proves the io.github.moureauf/* namespace
    steps:
      - uses: actions/checkout@v7
      - name: Install mcp-publisher
        # -f so an HTTP error fails here instead of piping an error page to tar.
        run: curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher
      - name: Publish to MCP registry
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
