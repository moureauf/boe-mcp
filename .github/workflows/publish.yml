name: Publish
on:
  push:
    tags: ["v*"]
  workflow_dispatch: # manual publish of the version in package.json
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC for npm trusted publishing + provenance
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      # Trusted publishing needs npm >= 11.5.1; Node 24's bundled npm can lag it.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      - run: npm test
      # No NODE_AUTH_TOKEN: auth comes from the OIDC token via the trusted
      # publisher configured for this repo/workflow on npmjs.com.
      - run: npm publish --provenance --access public
      # Publish the same version to the official MCP registry. Auth is via the
      # same GitHub OIDC token (id-token: write above); the io.github.moureauf/*
      # namespace is proven by this repo's owner. server.json must reference the
      # version just published to npm — the version-sync test guarantees that.
      - name: Install mcp-publisher
        run: curl -L "https://github.com/modelcontextprotocol/registry/releases/download/latest/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      - name: Publish to MCP registry
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
