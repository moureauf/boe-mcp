name: Temporary live verification
# TEMPORARY — exists only on the claude/generic-series-tools branch to verify
# the new series catalog against the real BoE endpoints (the dev sandbox
# cannot reach bankofengland.co.uk). Deleted before merge.
on:
  push:
    branches: [claude/generic-series-tools]
permissions:
  contents: read
jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: 24 }
      - run: npm ci
      - run: npm run test:live
