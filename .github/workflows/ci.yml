name: CI
on: [pull_request]
permissions:
  contents: read
# Cancel superseded runs when new commits are pushed to the same PR/branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Floor and ceiling of the supported range (package.json engines >=20).
        node-version: [20, 24]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: "${{ matrix.node-version }}" }
      - run: npm ci
      - run: npm run build
      - run: npm test
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: 24 }
      - run: npm ci
      - run: npm run lint
