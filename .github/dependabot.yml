version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    groups:
      # Dev deps and non-major runtime bumps are grouped into one PR each to
      # cut noise; major runtime bumps get their own PR so they can be reviewed.
      npm-development:
        dependency-type: development
      npm-production:
        dependency-type: production
        update-types: [minor, patch]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    groups:
      github-actions:
        patterns: ["*"]
